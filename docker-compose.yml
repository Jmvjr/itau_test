services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: compra_programada_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: compra_programada
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
    networks:
      - compra_programada_network

  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: compra_programada_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    networks:
      - compra_programada_network

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: compra_programada_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - compra_programada_network

  # Kafka Topic Initializer
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: compra_programada_kafka_init
    depends_on:
      - kafka
    entrypoint: [ 'bash', '-c' ]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --list
        kafka-topics --bootstrap-server kafka:29092 --create \
          --topic ir-dedo-duro \
          --partitions 1 \
          --replication-factor 1 \
          --if-not-exists
        kafka-topics --bootstrap-server kafka:29092 --list
    networks:
      - compra_programada_network

volumes:
  mysql_data:

networks:
  compra_programada_network:
    driver: bridge
